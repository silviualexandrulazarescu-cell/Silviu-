<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePilot OVB - Weekly Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>TimePilot OVB</h1>
            <p class="subtitle">Weekly Schedule Manager</p>
        </header>

        <main class="main-content">
            <div class="planner-wrapper">
                <table class="weekly-planner" id="weeklyPlanner">
                    <thead>
                        <tr>
                            <th class="time-header">Time</th>
                            <th>Monday</th>
                            <th>Tuesday</th>
                            <th>Wednesday</th>
                            <th>Thursday</th>
                            <th>Friday</th>
                            <th>Saturday</th>
                            <th>Sunday</th>
                        </tr>
                    </thead>
                    <tbody id="plannerBody">
                        <!-- Generated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="scheduleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Schedule Activity</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label for="categorySelect">Category *</label>
                    <select id="categorySelect" required>
                        <option value="">Select a category</option>
                        <option value="OVB">OVB</option>
                        <option value="Job">Job</option>
                        <option value="Free Time">Free Time</option>
                    </select>
                </div>

                <div class="form-group" id="subcategoryGroup" style="display: none;">
                    <label for="subcategorySelect">OVB Type *</label>
                    <select id="subcategorySelect">
                        <option value="">Select OVB type</option>
                        <option value="Analysis">Analysis</option>
                        <option value="Consultation 1">Consultation 1</option>
                        <option value="Consultation 2">Consultation 2</option>
                        <option value="Signing">Signing</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="clientName">Client Name</label>
                    <input type="text" id="clientName" placeholder="Enter client name">
                </div>

                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" placeholder="Enter additional notes" rows="4"></textarea>
                </div>

                <div class="time-info" id="timeInfo">
                    <!-- Will be populated with time slot info -->
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
                <button class="btn btn-primary" id="saveBtn">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay"></div>

    <script src="app.js"></script>
</body>
</html>
