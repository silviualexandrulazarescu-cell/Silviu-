<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimePilot OVB - Planificator Săptămânal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>TimePilot OVB</h1>
            <p class="subtitle">Manager de Planificare Săptămânală</p>
        </header>

        <main class="main-content">
            <div class="planner-wrapper">
                <table class="weekly-planner" id="weeklyPlanner">
                    <thead>
                        <tr>
                            <th class="time-header">Ora</th>
                            <th>Luni</th>
                            <th>Marți</th>
                            <th>Miercuri</th>
                            <th>Joi</th>
                            <th>Vineri</th>
                            <th>Sâmbătă</th>
                            <th>Duminică</th>
                        </tr>
                    </thead>
                    <tbody id="plannerBody">
                        <!-- Generated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="scheduleModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Activitate</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>

            <div class="modal-body">
                <div class="form-group">
                    <label for="categorySelect">Categorie *</label>
                    <select id="categorySelect" required>
                        <option value="">Selectează o categorie</option>
                        <option value="OVB">OVB</option>
                        <option value="Job">Job</option>
                        <option value="Timp liber">Timp liber</option>
                    </select>
                </div>

                <div class="form-group" id="subcategoryGroup" style="display: none;">
                    <label for="subcategorySelect">Tip activitate *</label>
                    <select id="subcategorySelect">
                        <option value="">Selectează tip activitate</option>
                        <option value="Analiză">Analiză</option>
                        <option value="Consultanță 1">Consultanță 1</option>
                        <option value="Consultanță 2">Consultanță 2</option>
                        <option value="Semnare">Semnare</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="clientName">Nume client</label>
                    <input type="text" id="clientName" placeholder="Introdu numele clientului">
                </div>

                <div class="form-group">
                    <label for="phone">Telefon</label>
                    <input type="tel" id="phone" placeholder="Introdu numărul de telefon">
                </div>

                <div class="form-group">
                    <label for="notes">Observații</label>
                    <textarea id="notes" placeholder="Introdu observații suplimentare" rows="4"></textarea>
                </div>

                <div class="time-info" id="timeInfo">
                    <!-- Will be populated with time slot info -->
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelBtn">Anulează</button>
                <button class="btn btn-primary" id="saveBtn">Salvează</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay"></div>

    <script src="app.js"></script>
</body>
</html>
